name: KPIC one-time PR runner

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: kpic-full-enrichment-20260716
  cancel-in-progress: false

jobs:
  enrich:
    if: github.event.pull_request.head.ref == 'chatgpt-kpic-enrichment-20260716'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout enrichment branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt-kpic-enrichment-20260716
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore scraper and verify packed inputs
        shell: bash
        run: |
          set -euo pipefail
          cat runner/packed/script.py.xz.b64.part.* | base64 -d > /tmp/chatgpt_healthkr_enrich.py.xz
          echo 'ecac68249635f5dfa8c98e5ad0b62023198bee3d1ad74814df1167e7b9c57dd2  /tmp/chatgpt_healthkr_enrich.py.xz' | sha256sum -c -
          xz -dc /tmp/chatgpt_healthkr_enrich.py.xz > runner/chatgpt_healthkr_enrich.py
          echo '371e5b5ac659d27d06fa0a0b37f6a052e8801e7cd0b9be19d3b383c2cd2a8110  runner/chatgpt_healthkr_enrich.py' | sha256sum -c -
          echo '3182225acecd5182abd2f0382e86da9ba9322716651fc4dfe759ac631699f938  input/enrichment-queue.json.xz' | sha256sum -c -
          xz -t input/enrichment-queue.json.xz

      - name: Install scraper dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4 lxml rapidfuzz pillow

      - name: Run full 776-product health.kr enrichment
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          python runner/chatgpt_healthkr_enrich.py \
            --input input/enrichment-queue.json.xz \
            --output enrichment-queue.json \
            --report enrichment-report.json \
            --workers 6 \
            --interval 0.15 \
            --checkpoint-every 20

      - name: Enforce final validation report
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('enrichment-report.json').read_text(encoding='utf-8'))
          assert report['valid'] is True, report
          assert report['object_count'] == 776, report
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Upload completed JSON and QA report
        uses: actions/upload-artifact@v4
        with:
          name: enrichment-queue-full
          path: |
            enrichment-queue.json
            enrichment-report.json
          if-no-files-found: error
          retention-days: 3
          compression-level: 6

      - name: Commit completed result to enrichment branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'ChatGPT Enrichment Runner'
          git config user.email 'actions@users.noreply.github.com'
          git add enrichment-queue.json enrichment-report.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Add completed KPIC enrichment [skip ci]'
          git push origin HEAD:chatgpt-kpic-enrichment-20260716
